# File for Pull Request on main branch
name: PR

# When a PR created or changed
on:
  pull_request:
    types: [labeled, closed, opened, reopened, synchronize]

jobs:
  test:
    # Setup OS and Node Version
    runs-on: [ubuntu-latest]
    env:
      NODE_OPTIONS: "--max-old-space-size=8192"
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
      JFROG_TOKEN: ${{ secrets.ARTIFACTORY_NPM_TOKEN }}
      FONT_AWESOME_TOKEN: ${{ secrets.FONT_AWESOME_TOKEN }}
      NX_NO_CLOUD: true
      GH_MERGED: ${{github.event.pull_request.merged}}
      GH_ACTION: ${{github.event.action}}
      GH_HEAD_REF: ${{ github.event.pull_request.head.ref }}
      GH_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
      GH_BASE_REF: ${{ github.event.pull_request.base.ref }}
      GH_BASE_SHA: ${{ github.event.pull_request.base.sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - uses: n1hility/cancel-previous-runs@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Enable Corepack (Yarn 4)
        run: corepack enable

      - name: Derive appropriate SHAs for base and head for `nx affected` commands
        uses: nrwl/nx-set-shas@v4
        with:
          main-branch-name: main

      - name: Install dependencies
        run: |
          yarn
          echo ""
          echo "GH_MERGED: $GH_MERGED"
          echo "GH_ACTION: $GH_ACTION"
          echo "GH_BASE_REF: $GH_BASE_REF"
          echo "GH_HEAD_REF: $GH_HEAD_REF"
          echo "GH_BASE_SHA: $GH_BASE_SHA"
          echo "GH_HEAD_SHA: $GH_HEAD_SHA"
      - name: Lint
        id: lint
        run: yarn affected:lint --parallel=5
      - name: Test
        id: test
        run: yarn affected:test --parallel=5
      
      - name: Publish
        id: publish
        if: success() && contains(github.event.pull_request.labels.*.name, 'publish') || (github.event.action == 'closed' && github.event.pull_request.merged == true)
        run: |
          echo "NX_BASE[0]: $NX_BASE"
          echo "NX_HEAD[0]: $NX_HEAD"
          echo "GH_MERGED: $GH_MERGED"
          echo "GH_ACTION: $GH_ACTION"
          echo "GH_PR_COMPLETE: $GH_PR_COMPLETE"
          echo "GH_HEAD_REF: $GH_HEAD_REF"
          echo "GH_HEAD_SHA: $GH_HEAD_SHA"
          echo "GH_BASE_REF: $GH_BASE_REF"
          echo "GH_BASE_SHA: $GH_BASE_SHA"
          if [ "$GH_PR_COMPLETE" = "true" ]; then
            echo "PATH[1]: $GH_PR_COMPLETE"
            echo VERSION_TAG=$GH_BASE_REF >> $GITHUB_ENV;
            echo NX_BASE=$GH_BASE_SHA >> $GITHUB_ENV;
            echo NX_HEAD=$GH_HEAD_SHA >> $GITHUB_ENV;
            export VERSION_TAG="$GH_BASE_REF";
            export NX_BASE="$GH_BASE_SHA"
            export NX_HEAD="$GH_HEAD_SHA"
          else
            echo "PATH[2]: $GH_PR_COMPLETE"
            export VERSION_TAG="$GH_HEAD_REF"
          fi
          echo "NX_BASE[1]: $NX_BASE"
          echo "NX_HEAD[1]: $NX_HEAD"
          echo "VERSION_TAG: $VERSION_TAG"
          
          EXCLUDE=$(yarn --silent nx affected:apps --plain | tr -s '[:blank:]' ','),embed
          AFFECTED=`yarn --silent nx affected:libs --with-deps --plain --exclude $EXCLUDE | tr -s '[:blank:]' ','`
          if [ -z "$AFFECTED" ]; then
            echo "No libraries impacted"
            echo "::set-output name=affected::NA"
            echo "::set-output name=body::NA"
            echo "::set-output name=upgrade::NA"
          else
            rm -f /tmp/versions.txt
            rm -f /tmp/upgrade.txt
            yarn nx affected --target=build --exclude=$EXCLUDE --parallel=4
            yarn nx affected --target=version --exclude $EXCLUDE --parallel 4
            yarn nx affected --target=publish --exclude $EXCLUDE --configuration production --parallel 4
            echo "::set-output name=body::$(cat /tmp/versions.txt | tr -s '\n' ' ')"
            echo "::set-output name=upgrade::$(cat /tmp/upgrade.txt | tr -s '\n' ' ')"
            echo "::set-output name=affected::$AFFECTED"
          fi

      - name: Find Publish Comment
        uses: peter-evans/find-comment@v2
        if: github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'publish') || (github.event.action == 'closed' && github.event.pull_request.merged == true)
        id: fc
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-author: 'github-actions[bot]'
          body-includes: preview-publish

      - name: Create or update comment
        uses: peter-evans/create-or-update-comment@v2
        if: github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'publish') || (github.event.action == 'closed' && github.event.pull_request.merged == true)
        with:
          comment-id: ${{ steps.fc.outputs.comment-id }}
          issue-number: ${{ github.event.pull_request.number }}
          body: |
            ## Packages [preview-publish]  
            ### Affected  
            ${{ steps.publish.outputs.affected }}
            ### Package Entries  
            ${{ steps.publish.outputs.body }}
            ### Upgrade  
            `yarn upgrade -E ${{ steps.publish.outputs.upgrade }}`
          edit-mode: replace

      # - name: Publish Sentry (master only)
