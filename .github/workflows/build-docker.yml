name: Docker

on:
  pull_request:
    types: [labeled, closed, opened, reopened, synchronize]

jobs:
  docker:
    runs-on: ubuntu-latest
    if: contains(github.event.pull_request.labels.*.name, 'publish') || (github.event.action == 'closed' && github.event.pull_request.merged == true)
    env:
      BUILD_TYPE: docker
      INPUT_PUSH: true
      INPUT_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      INPUT_SECRETS: 'GITHUB_TOKEN=${{ secrets.GITHUB_TOKEN }},JFROG_TOKEN=${{ secrets.ARTIFACTORY_NPM_TOKEN }}'
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
      JFROG_TOKEN: ${{ secrets.ARTIFACTORY_NPM_TOKEN }}
      FONT_AWESOME_TOKEN: ${{ secrets.FONT_AWESOME_TOKEN }}
      NX_CLOUD_AUTH_TOKEN: ${{ secrets.NX_CLOUD_AUTH_TOKEN }}
      GH_MERGED: ${{github.event.pull_request.merged}}
      GH_ACTION: ${{github.event.action}}
      GH_PR_COMPLETE: ${{github.event.action == 'closed' && github.event.pull_request.merged==true}}
      GH_HEAD_REF: ${{ github.event.pull_request.head.ref }}
      GH_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
      GH_BASE_REF: ${{ github.event.pull_request.base.ref }}
      GH_BASE_SHA: ${{ github.event.pull_request.base.sha }}

    strategy:
      matrix:
        # Latest nodes only
        node-version: [16.x]

    steps:
      - name: SETUP - Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: SETUP - QEMU
        uses: docker/setup-qemu-action@v2

      - name: SETUP - Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: SETUP - Docker Login
        uses: docker/login-action@v2
        with:
          registry: bondhouse-docker-local.jfrog.io
          username: ${{ secrets.ARTIFACTORY_USERNAME }}
          password: ${{ secrets.ARTIFACTORY_TOKEN }}

      - uses: actions/setup-node@v3
        with:
          node-version: ${{ matrix.node-version }}

      - name: SETUP - Derive nx env
        uses: nrwl/nx-set-shas@v2
        with:
          main-branch-name: main
      - name: SETUP - NX Base on merge
        if: github.event.action == 'closed' && github.event.pull_request.merged == true
        run: echo "NX_BASE=HEAD~1" >> $GITHUB_ENV

      - uses: actions/cache@v3
        id: yarn-cache
        name: SETUP - Cache
        with:
          path: |
            ${{ github.workspace }}/node_modules
            !${{ github.workspace }}/node_modules/.cache
          key: ${{ runner.os }}-yarn-${{ hashFiles('yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-yarn-

      - name: SETUP - Artifactory NPM
        run: ./.github/scripts/setup-npmrc.sh

      - name: SETUP - Install Dependencies
        if: steps.yarn-cache.outputs.cache-hit != 'true'
        run: yarn --frozen-lockfile

      - name: SETUP - Derive affected apps
        run: |
          export AFFECTED_APPS=$(yarn --silent nx affected:apps --plain | tr -s '[:blank:]' ',')
          export AFFECTED_LIBS=$(yarn --silent nx affected:libs --plain | tr -s '[:blank:]' ',')
          echo "AFFECTED_LIBS=$AFFECTED_LIBS" >> $GITHUB_ENV;
          echo "AFFECTED_APPS=$AFFECTED_APPS" >> $GITHUB_ENV;
          echo "APPS: $AFFECTED_APPS - LIBS: $AFFECTED_LIBS"

      - name: ACTION - Publish Docker (main branch)
        if: env.AFFECTED_APPS != '' && github.event.action == 'closed' && github.event.pull_request.merged == true
        run: BUILD_TYPE=docker yarn nx affected --target=docker --projects=$AFFECTED_APPS --parallel 4 --production --configuration=merge
      - name: ACTION - Publish Docker (pr)
        if: env.AFFECTED_APPS != '' && github.event.action != 'closed' && github.event.pull_request.merged != true && github.event.pull_request.head.ref !='staging'
        run: BUILD_TYPE=docker yarn nx affected --target=docker --projects=$AFFECTED_APPS --parallel 4 --production --configuration=pr
      - name: ACTION - Publish Docker (staging)
        if: env.AFFECTED_APPS != '' && github.event.action != 'closed' && github.event.pull_request.merged != true && github.event.pull_request.head.ref == 'staging'
        run: BUILD_TYPE=docker yarn nx affected --target=docker --projects=$AFFECTED_APPS --parallel 4 --production --configuration=rc
